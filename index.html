<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XPK Admin Panel</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:340px;
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
color:#fff;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

h1{
margin-bottom:10px;
}

p{
margin-bottom:20px;
color:#cbd5e1;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#2563eb;
border:none;
color:#fff;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>

</head>

<body>

<div class="card">

<h1>🔐 XPK ADMIN PANEL</h1>

<p>Welcome to XPK Income Bot Admin Panel</p>

<button>Login</button>

</div>

</body>
</html>
